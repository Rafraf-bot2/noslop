name: Build APK & GitHub Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - run: npm ci

      - name: Generate native Android project
        run: npx expo prebuild --platform android --clean

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Find APK
        run: find android/app/build/outputs/apk -name "*.apk" | tee apk_path.txt

      - name: Rename APK
        run: |
          APK=$(cat apk_path.txt | head -1)
          cp "$APK" insta-no-reels-${{ github.ref_name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: insta-no-reels-${{ github.ref_name }}.apk
          generate_release_notes: true
